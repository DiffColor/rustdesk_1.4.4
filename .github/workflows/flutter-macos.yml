name: Flutter macOS Manual Build

on:
  workflow_dispatch:
    inputs:
      build-ref:
        description: "빌드할 브랜치/태그/SHA, 비우면 선택한 ref 사용"
        required: false
        default: ""
        type: string
      upload-artifact:
        description: "릴리스/아티팩트를 업로드할지 여부"
        required: false
        default: true
        type: boolean
      upload-tag:
        description: "수동 빌드 결과를 업로드할 태그 이름"
        required: false
        default: "manual"
        type: string

permissions:
  contents: write

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  run-flutter-macos-build:
    needs: [generate-bridge]
    uses: ./.github/workflows/flutter-build-macos.yml
    secrets: inherit
    with:
      ref: ${{ inputs.build-ref }}
      upload-artifact: ${{ inputs.upload-artifact }}
      upload-tag: ${{ inputs.upload-tag }}
