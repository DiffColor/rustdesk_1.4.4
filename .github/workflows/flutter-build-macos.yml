name: Build the macOS flutter version of the RustDesk

on:
  workflow_call:
    inputs:
      ref:
        type: string
        default: ""
      upload-artifact:
        type: boolean
        default: true
      upload-tag:
        type: string
        default: "nightly"
    secrets:
      MACOS_P12_BASE64:
        required: false
      MACOS_P12_PASSWORD:
        required: false
      MACOS_NOTARIZE_JSON:
        required: false
      MACOS_CODESIGN_IDENTITY:
        required: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MAC_RUST_VERSION: "1.81" # 1.81 is requred for macos, because of https://github.com/yury/cidre requires 1.81
  FLUTTER_VERSION: "3.24.5"
  TAG_NAME: "${{ inputs.upload-tag }}"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  # vcpkg version: 2025.08.27
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.4"
  MACOS_P12_BASE64: "${{ secrets.MACOS_P12_BASE64 }}"
  UPLOAD_ARTIFACT: "${{ inputs.upload-artifact }}"

jobs:
  build-for-macOS:
    name: ${{ matrix.job.target }}
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - {
              target: x86_64-apple-darwin,
              os: macos-15-intel,
              extra-build-args: "",
              arch: x86_64,
              vcpkg-triplet: x64-osx,
            }
          - {
              target: aarch64-apple-darwin,
              os: macos-15,
              extra-build-args: "--screencapturekit",
              arch: aarch64,
              vcpkg-triplet: arm64-osx,
            }
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}
          submodules: recursive

      - name: Verify checked out source
        shell: bash
        run: |
          git rev-parse HEAD
          git describe --tags --always --dirty || true
          grep -n "let mut event_loop = EventLoopBuilder::new().build();" src/tray.rs
          grep -n "static bool IsAtLeastMacOSVersion" src/platform/macos.mm
          grep -n "CGPreflightScreenCaptureAccess();" src/platform/macos.mm

      - name: Import the codesign cert
        if: env.MACOS_P12_BASE64 != ''
        uses: apple-actions/import-codesign-certs@v1
        with:
          p12-file-base64: ${{ secrets.MACOS_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_P12_PASSWORD }}
          keychain: rustdesk

      - name: Check sign and import sign key
        if: env.MACOS_P12_BASE64 != ''
        run: |
          security default-keychain -s rustdesk.keychain
          security find-identity -v

      - name: Import notarize key
        if: env.MACOS_P12_BASE64 != ''
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: rustdesk.json
          fileDir: ${{ github.workspace }}
          encodedString: ${{ secrets.MACOS_NOTARIZE_JSON }}

      - name: Install rcodesign tool
        if: env.MACOS_P12_BASE64 != ''
        shell: bash
        run: |
          pushd /tmp
          wget https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F0.22.0/apple-codesign-0.22.0-macos-universal.tar.gz
          tar -zxvf apple-codesign-0.22.0-macos-universal.tar.gz
          mv apple-codesign-0.22.0-macos-universal/rcodesign /usr/local/bin
          popd

      - name: Install build runtime
        run: |
          brew install llvm nasm
          echo "$(brew --prefix nasm)/bin" >> $GITHUB_PATH
          export PATH="$(brew --prefix nasm)/bin:$PATH"
          which nasm
          nasm -v
          nasm -hO | grep -- "-Ox" || true
          if command -v pkg-config &>/dev/null; then
              echo "pkg-config is already installed"
          else
              brew install pkg-config
          fi

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Patch flutter
        run: |
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == ${{env.FLUTTER_VERSION}} ]] && git apply ${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff

      - name: Workaround for flutter issue
        shell: bash
        run: |
          cd "$(dirname "$(which flutter)")"
          # https://github.com/flutter/flutter/issues/133533
          sed -i '' -e 's/_setFramesEnabledState(false);/\/\/_setFramesEnabledState(false);/g' ../packages/flutter/lib/src/scheduler/binding.dart
          grep -n '_setFramesEnabledState(false);' ../packages/flutter/lib/src/scheduler/binding.dart

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: "rustfmt"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.job.os }}

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        run: |
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"
              echo "======"
              cat "$_1"
              echo "======"
              echo ""
            done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-${{ matrix.job.vcpkg-triplet }}-rel-out.log" || true

      - name: Show version information (Rust, cargo, Clang)
        shell: bash
        run: |
          clang --version || true
          rustup -V
          rustup toolchain list
          rustup default
          cargo -V
          rustc -V

      - name: Stabilize git transport for cargo dependencies
        shell: bash
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999

      - name: Pre-fetch cargo dependencies
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          for attempt in 1 2 3; do
            if cargo fetch --locked --target ${{ matrix.job.target }}; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "cargo fetch failed after ${attempt} attempts"
              exit 1
            fi
            echo "cargo fetch failed on attempt ${attempt}, retrying..."
            rm -rf ~/.cargo/git/checkouts/hwcodec-* ~/.cargo/git/db/hwcodec-* || true
            sleep $((attempt * 15))
          done

      - name: Build rustdesk
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          if [ "${{ matrix.job.target }}" = "aarch64-apple-darwin" ]; then
            MIN_MACOS_VERSION="12.3"
            sed -i '' -e "s/MACOSX_DEPLOYMENT_TARGET\=[0-9]*.[0-9]*/MACOSX_DEPLOYMENT_TARGET=${MIN_MACOS_VERSION}/" build.py
            sed -i '' -e "s/platform :osx, '.*'/platform :osx, '${MIN_MACOS_VERSION}'/" flutter/macos/Podfile
            sed -i '' -e "s/osx_minimum_system_version = \"[0-9]*.[0-9]*\"/osx_minimum_system_version = \"${MIN_MACOS_VERSION}\"/" Cargo.toml
            sed -i '' -e "s/MACOSX_DEPLOYMENT_TARGET = [0-9]*.[0-9]*;/MACOSX_DEPLOYMENT_TARGET = ${MIN_MACOS_VERSION};/" flutter/macos/Runner.xcodeproj/project.pbxproj
          fi
          ./build.py --flutter --hwcodec --unix-file-copy-paste ${{ matrix.job.extra-build-args }}

      - name: Create unsigned macOS app zip
        if: env.UPLOAD_ARTIFACT == 'true'
        run: |
          rm -f rustdesk-${{ env.VERSION }}-unsigned-${{ matrix.job.arch }}.zip
          ditto -c -k --sequesterRsrc --keepParent ./flutter/build/macos/Build/Products/Release/RustDesk.app rustdesk-${{ env.VERSION }}-unsigned-${{ matrix.job.arch }}.zip

      - name: Upload unsigned macOS app
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: actions/upload-artifact@master
        with:
          name: rustdesk-unsigned-macos-${{ matrix.job.arch }}
          path: rustdesk-${{ env.VERSION }}-unsigned-${{ matrix.job.arch }}.zip

      - name: Codesign app and create signed zip
        if: env.MACOS_P12_BASE64 != '' && env.UPLOAD_ARTIFACT == 'true'
        run: |
          security default-keychain -s rustdesk.keychain
          security unlock-keychain -p ${{ secrets.MACOS_P12_PASSWORD }} rustdesk.keychain
          rm -f rustdesk-${{ env.VERSION }}-${{ matrix.job.arch }}.zip || true
          codesign --force --options runtime -s ${{ secrets.MACOS_CODESIGN_IDENTITY }} --deep --strict ./flutter/build/macos/Build/Products/Release/RustDesk.app -vvv
          rcodesign notary-submit --api-key-path ${{ github.workspace }}/rustdesk.json --staple ./flutter/build/macos/Build/Products/Release/RustDesk.app
          ditto -c -k --sequesterRsrc --keepParent ./flutter/build/macos/Build/Products/Release/RustDesk.app rustdesk-${{ env.VERSION }}-${{ matrix.job.arch }}.zip

      - name: Verify signed macOS bundle
        if: env.MACOS_P12_BASE64 != '' && env.UPLOAD_ARTIFACT == 'true'
        run: |
          codesign --verify --deep --strict --verbose=2 ./flutter/build/macos/Build/Products/Release/RustDesk.app
          xcrun stapler validate ./flutter/build/macos/Build/Products/Release/RustDesk.app
          spctl --assess --type exec -v ./flutter/build/macos/Build/Products/Release/RustDesk.app

      - name: Publish macOS app zip
        if: env.MACOS_P12_BASE64 != '' && env.UPLOAD_ARTIFACT == 'true'
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          files: |
            rustdesk-${{ env.VERSION }}-${{ matrix.job.arch }}.zip

      - name: Publish unsigned macOS app zip
        if: env.MACOS_P12_BASE64 == '' && env.UPLOAD_ARTIFACT == 'true'
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          files: |
            rustdesk-${{ env.VERSION }}-unsigned-${{ matrix.job.arch }}.zip
